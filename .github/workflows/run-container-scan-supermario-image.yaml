name: "Run Container Scan on Super Mario Docker Image with Quality Gate"

on:
  push:
    branches:
      - main

jobs:
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Compute Version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Get Docker Image from Docker Hub
        run: |
          docker pull docker.io/mskot/supermariogitopsproject:${{ steps.version.outputs.VERSION }}
          docker save -o $GITHUB_WORKSPACE/supermariolatestdockerimage.tar docker.io/mskot/supermariogitopsproject:${{ steps.version.outputs.VERSION }}

      - name: Verify image tarball was created
        run: ls -lh $GITHUB_WORKSPACE/supermariolatestdockerimage.tar

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/mskot/supermariogitopsproject:${{ steps.version.outputs.VERSION }}
          exit-code: "1"
          severity: "CRITICAL,HIGH"
